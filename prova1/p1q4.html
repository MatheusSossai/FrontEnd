<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style> 
        body, html {
            height: 100%;
            margin: 0;
        }

        .bg-copa {
            background-image: url('fifa.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body>

<div class="bg-copa">
    <div class="d-flex flex-column align-items-center">       

        <div class="card" style="width: 22rem;" aria-hidden="true">
            
            <!-- ✅ ADICIONADO ID NA IMAGEM -->
            <img id="imagem" src="img/img_.svg" class="card-img-top" alt="Placeholder Copa">
            
            <div class="card-body"> 

                <!-- ✅ ID CORRIGIDO -->
                <h5 id="nome" class="card-title placeholder-glow">
                    <span class="placeholder col-6"></span>
                    
                    <!-- ✅ ID CORRIGIDO -->
                    <span id="rank" class="badge text-bg-secondary">-</span>
                </h5>

                <p class="card-text placeholder-glow">
                    
                    <!-- ✅ IDs PADRONIZADOS -->
                    <span id="data" class="placeholder col-4"></span><br>
                    <span id="altura" class="placeholder col-4"></span><br>
                    <span id="posicao" class="placeholder col-6"></span><br>
                
                </p>

            </div>
        </div>

        <!-- ✅ botão ok -->
        <a href="#" onclick="revelar()" class="btn btn-primary" style="margin: 10px; padding: 10px;">
            Revelar 
        </a>

    </div>
</div>

<script src="js/bootstrap.js"></script>
<script src="scripito.js"></script> <!-- ✅ corrigido nome -->
</body>
</html>
