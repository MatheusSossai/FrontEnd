<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; }
        .bg-copa {
            background-image: url(https://github.com/ProfDacioMachado/PROGRAMA-O-FRONT-END-2026-/blob/main/PROVAS/DIA%201/img/FIFA-World-Cup-26.jpg?raw=true);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.95);
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin: 10px;
        }
    </style>
</head>
<body>

    <div class="bg-copa">
        <div id="container-jogadores" class="d-flex flex-row flex-wrap justify-content-center align-items-start">
            
            <div class="card" style="width: 22rem;">
                <img src="vinijrpic.png" class="card-img-top" alt="Jogador">
                <div class="card-body"> 
                    <h5 class="card-title">Vinícius Jr.</h5>
                    <p class="card-text">
                        Data de Nascimento: 12/07/2000<br>
                        Altura: 1,76 m<br>
                        Posição: Atacante
                    </p>
                </div>
            </div>
        </div>

        <div class="mt-4">
            <button onclick="revelar()" class="btn btn-warning">Revelar</button>
            <button onclick="add()" class="btn btn-primary">Adicionar Novo Jogador</button>
        </div>
    </div>

    <script src="vini.js"></script>
</body>
</html>
