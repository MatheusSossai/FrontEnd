<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Criatura medonha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="hud">
        <div class="avatar">
            <img src="b_n.png" alt="avatar">
        </div>

        <input 
            type="text" 
            id="nomeCriatura"
            placeholder="Nome da criatura..."
        >
    </div>


    <div class="game">


        <img 
            id="cria"
            src="b_n.png"
            alt="Criatura"
            class="criatura"
        >


        <img 
            id="btn"
            src="btn.png"
            alt="Alimentar"
            class="btn"
            onclick="alimentar()"
        >
    </div>

    <script src="bixoloko.js"></script>
</body>
</html>
